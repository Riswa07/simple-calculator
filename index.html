<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Calculator</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        <div class="buttons">
            <button onclick="clearDisplay()" class="btn btn-action">C</button>
            <button onclick="backspace()" class="btn btn-action">⌫</button>
            <button onclick="displayValue('%')" class="btn btn-action">%</button>
            <button onclick="displayValue('/')" class="btn btn-operator">÷</button>

            <button onclick="displayValue('7')" class="btn btn-number">7</button>
            <button onclick="displayValue('8')" class="btn btn-number">8</button>
            <button onclick="displayValue('9')" class="btn btn-number">9</button>
            <button onclick="displayValue('*')" class="btn btn-operator">×</button>

            <button onclick="displayValue('4')" class="btn btn-number">4</button>
            <button onclick="displayValue('5')" class="btn btn-number">5</button>
            <button onclick="displayValue('6')" class="btn btn-number">6</button>
            <button onclick="displayValue('-')" class="btn btn-operator">−</button>

            <button onclick="displayValue('1')" class="btn btn-number">1</button>
            <button onclick="displayValue('2')" class="btn btn-number">2</button>
            <button onclick="displayValue('3')" class="btn btn-number">3</button>
            <button onclick="displayValue('+')" class="btn btn-operator">+</button>

            <button onclick="displayValue('00')" class="btn btn-number">00</button>
            <button onclick="displayValue('0')" class="btn btn-number">0</button>
            <button onclick="displayValue('.')" class="btn btn-number">.</button>
            <button onclick="Calculation('=')" class="btn btn-equal">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
